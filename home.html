<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Genie - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <div class="background-container"></div>
  <div class="content-wrapper">
    <div class="container">
      <div class="row g-4 align-items-center">
        <div class="col-lg-7">
          <div class="text-center">
            <h1 class="d-lg-none main-heading mt-3">Workout Genie</h1>
            <p class="d-lg-none sub-heading mb-3" id="welcomeMessage"></p>
            <div class="col-lg-7 d-lg-none genie-placeholder-container">
              <div class="genie-placeholder">
                <img id="genieImage"
                  src="https://ik.imagekit.io/tuf7vvv2d/Gemini_Generated_Image_2fh6742fh6742fh6-removebg.png?updatedAt=1759208045860"
                  alt="Workout Genie">
              </div>
            </div>
          </div>
          <div class="glass-card glass-card2 p-4 h-100">
            <h2 class="main-heading mb-4">Current Status</h2>
            <div class="row g-4">
              <div class="col-md-6">
                <div class="stat-card">
                  <h5>Current Weight</h5>
                  <p id="currentWeightDisplay">... kg</p>
                </div>
              </div>
              <div class="col-md-6">
                <div class="stat-card">
                  <h5>Height</h5>
                  <p id="heightDisplay">... cm</p>
                </div>
              </div>
              <div class="col-md-6">
                <div class="stat-card">
                  <h5>BMI</h5>
                  <p id="bmiDisplay">...</p>
                </div>
              </div>
              <div class="col-md-6">
                <div class="stat-card">
                  <h5>Workout Week</h5>
                  <p id="weekCountDisplay">Week ...</p>
                </div>
              </div>
            </div>
          </div>
          <div class="glass-card  mt-3 p-4">
            <h2 class="main-heading mb-4 text-center">Actions</h2>
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
              <button id="viewWorkoutBtn" class="gradient-btn large-action-btn flex-sm-fill"><i
                  class="fas fa-dumbbell"></i> Go to Workout</button>
              <button id="nextWeekBtn" class="gradient-btn large-action-btn flex-sm-fill"><i
                  class="fas fa-calendar-plus"></i> Start Week ...</button>
            </div>
          </div>
        </div>
        <div class="col-lg-5 d-none d-lg-flex genie-placeholder-container">
          <div class="text-center">
            <h1 class="main-heading mt-0">Workout Genie</h1>
            <p class="sub-heading mb-3" id="welcomeMessage2"></p>
            <div class="col-lg-7 w-100 genie-placeholder-container">
              <div class="genie-placeholder">
                <img id="genieImage2"
                  src="https://ik.imagekit.io/tuf7vvv2d/Gemini_Generated_Image_2fh6742fh6742fh6-removebg.png?updatedAt=1759208045860"
                  alt="Workout Genie" class="img-fluid">
              </div>
              <nav class="navbar navbar-expand glass-card-nav mb-0 navbar-dark d-none d-lg-flex ">
                <ul class="navbar-nav flex-row justify-content-end w-100">
                  <li class="nav-item"><a class="nav-link text-white" href="index.html" id="logoutButtonMobile"><i
                        class="fas fa-sign-out-alt me-1"></i> Logout</a></li>
                </ul>
              </nav>
            </div>
          </div>
        </div>
        <div class="row mt-3">
          <nav class="navbar navbar-expand glass-card-nav mb-0 navbar-dark d-lg-none">
            <ul class="navbar-nav flex-row justify-content-end w-100">
              <li class="nav-item"><a class="nav-link text-white" href="index.html" id="logoutButtonMobile"><i
                    class="fas fa-sign-out-alt me-1"></i> Logout</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </div>

  <div id="nextWeekModal" class="modal-backdrop d-none">
    <div class="modal-content glass-card text-center">
      <div id="modalGenie" class="genie-placeholder">
        <img id="modalGenieImage"
          src="https://ik.imagekit.io/tuf7vvv2d/Gemini_Generated_Image_2fh6742fh6742fh6-removebg.png?updatedAt=1759208045860"
          alt="Workout Genie">
      </div>
      <div id="modalFormContent">
        <h2 class="main-heading">Start Next Week</h2>
        <p class="sub-heading">Update your weight to tailor the new plan.</p>
        <form id="nextWeekForm" class="mt-4">
          <input type="number" id="newWeightInput" class="form-control glass-input" placeholder="New Weight (kg)"
            required>
          <button type="submit" class="gradient-btn w-100 mt-3">Generate New Plan</button>
          <button type="button" id="closeModalBtn" class="btn btn-outline-light w-100 mt-2">Cancel</button>
        </form>
      </div>
      <div id="modalLoadingContent" class="d-none">
        <p class="sub-heading my-4" id="modalQuote">The Genie is crafting your new plan...</p>
        <div class="loader mx-auto mt-4"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
