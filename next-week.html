<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Genie - Start Next Week</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <div class="background-container"></div>
  <div class="content-wrapper">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-7 genie-placeholder-container">
          <div class="genie-placeholder">
            <img id="genieImage"
              src="https://ik.imagekit.io/tuf7vvv2d/Gemini_Generated_Image_2fh6742fh6742fh6-removebg.png?updatedAt=1759208045860"
              alt="Workout Genie">
          </div>
        </div>
        <div class="col-lg-5">
          <div class="glass-card">
            <div id="formContainer">
              <h2 class="main-heading text-center">Update Your Progress</h2>
              <p class="sub-heading text-center">Enter your new weight to generate a fresh plan for the week.</p>
              <form id="nextWeekForm" class="mt-4">
                <input type="number" id="newWeightInput" class="form-control glass-input" placeholder="New Weight (kg)"
                  required>
                <button type="submit" class="gradient-btn w-100 mt-3">Generate New Plan</button>
                <a href="home.html" class="btn btn-outline-light w-100 mt-2">Back to Home</a>
              </form>
            </div>
            <div id="loadingContainer" class="d-none text-center">
              <h1 class="main-heading mb-4">Forging a new path...</h1>
              <p class="sub-heading my-4" id="motivationalQuote">Adapting your journey to your new strength.</p>
              <div class="loader mx-auto mt-4"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
