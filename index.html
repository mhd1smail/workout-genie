<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Workout Genie</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="background-container"></div>
  <div class="content-wrapper">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-7 d-none d-lg-flex genie-placeholder-container">
          <div class="genie-placeholder">
            <img id="genieImage"
              src="https://ik.imagekit.io/tuf7vvv2d/Gemini_Generated_Image_2fh6742fh6742fh6-removebg.png?updatedAt=1759208045860"
              alt="Workout Genie">
          </div>
        </div>
        <div class="col-lg-5">
          <div class="d-flex flex-column align-items-center">
            <div class="col-lg-7 d-lg-none genie-placeholder-container">
              <div class="genie-placeholder">
                <img id="genieImage2"
                  src="https://ik.imagekit.io/tuf7vvv2d/Gemini_Generated_Image_2fh6742fh6742fh6-removebg.png?updatedAt=1759208045860"
                  alt="Workout Genie">
              </div>
            </div>
            <div class="glass-card glass-card2 w-100">
              <div id="signInView">
                <h2 class="main-heading">Welcome Back!</h2>
                <p class="sub-heading">Sign in to continue.</p>
                <form id="signInForm" class="mt-4">
                  <div class="mb-3">
                    <input type="text" id="signInUsername" class="form-control glass-input" placeholder="Username"
                      required>
                  </div>
                  <div class="mb-4">
                    <input type="password" id="signInPassword" class="form-control glass-input" placeholder="Password"
                      required>
                  </div>
                  <button type="submit" class="gradient-btn w-100">Sign In</button>
                </form>
                <p class="text-center mt-4 form-switch-text">
                  Don't have an account? <a href="#" id="showSignUp">Sign Up</a>
                </p>
              </div>
              <div id="signUpView" class="d-none">
                <h2 class="main-heading">Create Account</h2>
                <p class="sub-heading">Let's get you started!</p>
                <form id="signUpForm" class="mt-4">
                  <div class="mb-3">
                    <input type="text" id="signUpUsername" class="form-control glass-input" placeholder="Username"
                      required>
                  </div>
                  <div class="mb-4">
                    <input type="password" id="signUpPassword" class="form-control glass-input" placeholder="Password"
                      required>
                  </div>
                  <button type="submit" class="gradient-btn w-100">Sign Up</button>
                </form>
                <p class="text-center mt-4 form-switch-text">
                  Already have an account? <a href="#" id="showSignIn">Sign In</a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
