<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Genie - Your Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="background-container"></div>
  <div class="content-wrapper">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-7 genie-placeholder-container">
          <div class="genie-placeholder">
            <img id="genieImage"
              src="https://ik.imagekit.io/tuf7vvv2d/Gemini_Generated_Image_2fh6742fh6742fh6-removebg.png?updatedAt=1759208045860"
              alt="Workout Genie" class="img-fluid">
          </div>
        </div>
        <div class="col-lg-5">
          <div class="glass-card glass-card2" id="detailsCard">
            <div id="formContainer">
              <div class="progress-container mb-4">
                <div class="progress-bar" id="progressBar" style="width: 20%;"></div>
              </div>
              <form id="multiStepForm">
                <div class="form-step active-step">
                  <h2 class="main-heading mb-3">Let's get to know you.</h2>
                  <input type="text" data-field="name" class="form-control glass-input mb-3"
                    placeholder="What should I call you?" required>
                  <input type="text" onfocus="(this.type='date')" onblur="(this.type='text')" data-field="dob"
                    class="form-control glass-input mb-3" placeholder="Date of Birth" required>
                  <div class="text-center mb-3">
                    <div class="form-check form-check-inline"><input class="form-check-input" type="radio"
                        name="workoutLocation" data-field="workoutLocation" value="Gym" required checked><label
                        class="form-check-label">Gym</label></div>
                    <div class="form-check form-check-inline"><input class="form-check-input" type="radio"
                        name="workoutLocation" data-field="workoutLocation" value="Home Workout"><label
                        class="form-check-label">Home Workout</label></div>
                  </div>
                  <button type="button" class="gradient-btn w-100 next-btn">Next</button>
                </div>
                <div class="form-step">
                  <h2 class="main-heading mb-3">What is your gender?</h2>
                  <div class="text-center mb-3">
                    <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="gender"
                        data-field="gender" value="Male" required checked><label class="form-check-label">Male</label>
                    </div>
                    <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="gender"
                        data-field="gender" value="Female"><label class="form-check-label">Female</label></div>
                  </div>
                  <div class="d-flex gap-2"><button type="button"
                      class="btn btn-outline-light w-50 prev-btn">Back</button><button type="button"
                      class="gradient-btn w-50 next-btn">Next</button></div>
                </div>
                <div class="form-step">
                  <h2 class="main-heading mb-3">Your current stats?</h2>
                  <input type="number" data-field="height" class="form-control glass-input mb-3"
                    placeholder="Height (cm)" required>
                  <input type="number" data-field="weight" class="form-control glass-input mb-3"
                    placeholder="Weight (kg)" required>
                  <div class="d-flex gap-2"><button type="button"
                      class="btn btn-outline-light w-50 prev-btn">Back</button><button type="button"
                      class="gradient-btn w-50 next-btn">Next</button></div>
                </div>
                <div class="form-step">
                  <h2 class="main-heading mb-3">Your goals & experience?</h2>
                  <input type="number" data-field="goalWeight" class="form-control glass-input mb-3"
                    placeholder="Goal Weight (kg)" required>
                  <select data-field="experience" class="form-control glass-input mb-3" required>
                    <option value="" disabled selected>Workout Experience...</option>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                  </select>
                  <div class="d-flex gap-2"><button type="button"
                      class="btn btn-outline-light w-50 prev-btn">Back</button><button type="button"
                      class="gradient-btn w-50 next-btn">Next</button></div>
                </div>
                <div class="form-step">
                  <h2 class="main-heading mb-3">Any health issues?</h2>
                  <textarea data-field="healthIssues" class="form-control glass-input mb-3" rows="4"
                    placeholder="e.g., Knee pain, past injuries, or type 'None'"></textarea>
                  <div class="d-flex gap-2"><button type="button"
                      class="btn btn-outline-light w-50 prev-btn">Back</button><button type="submit"
                      class="gradient-btn w-50">Generate Plan</button></div>
                </div>
              </form>
            </div>
            <div id="loadingContainer" class="d-none text-center">
              <h1 class="main-heading mb-4">Your wish is my command...</h1>
              <p class="sub-heading my-4" id="motivationalQuote">Crafting your perfect workout plan.</p>
              <div class="loader mx-auto mt-4"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
